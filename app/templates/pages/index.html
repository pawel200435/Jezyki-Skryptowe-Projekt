<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EatSafe - Monitorowanie Ostrzeżeń GIS</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/bootstrap.min.css') }}"
    />
    
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/all.css') }}"
    />
    
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container-fluid vh-100 p-0 overflow-hidden">
        <div class="row h-100 g-0">
            <div class="col-auto h-100 p-0">
                <nav class="sidebar w-100 h-100 d-flex flex-column align-items-center p-0 pt-1">

                    <div class="text-center p-2 mb-3 w-100"><i class="fa-solid fa-bars fa-3x"></i></div>

                    <button class="btn-navbar p-2 mb-5 w-100" title="Informacje" data-bs-toggle="modal" id="nav-btn-info" data-bs-target="#infoModal"><i class="fa-solid fa-info fa-2x "></i></button>

                    <button class="btn-navbar btn-navbar-active p-2 mb-5 w-100" title="Zagrożenia" id="nav-btn-warnings"><i class="fa-solid fa-triangle-exclamation fa-2x"></i></button>

                    <button class="btn-navbar p-2 w-100" title="Newsletter" data-bs-toggle="modal" id="nav-btn-news"  data-bs-target="#newsletterModal"><i class="fa-solid fa-envelope fa-2x"></i></button>
                </nav>
            </div>

            <div class="col h-100 w-100 d-flex flex-column bg-light">
                <header class="topbar d-flex justify-content-between px-3 py-1 border-bottom border-black">
                    <div class="logo">
                        <h1 class="m-0 logo-text d-flex align-items-center justify-content-center gap-2">
                            <img src="{{ url_for('static', filename='img/icon.webp') }}" width="64" height="64" alt="logo"> Eat<span style="color: #70C1B3">Safe</span>
                        </h1>
                    </div>
                    
                    {% include 'partials/sync_button.html'  %}
                </header>

                <main class="main-background flex-grow-1 d-flex flex-column overflow-hidden">
                    <div class="d-flex justify-content-between align-items-center m-2">
                        <div class="">
                            <button type="button" class="btn btn-light fs-5"
                            hx-post="/ui/export"
                            hx-target="#toastPlacement" 
                            hx-swap="beforeend" 
                            hx-include="#result-list"
                            >
                                <i class="fa-solid fa-arrow-up-from-bracket fa-lg me-2"></i>
                                Eksport
                            </button>
                        </div>

                        <div class="d-flex align-items-center gap-2">
                            <button type="button" class="btn btn-light fs-5 me-2"          
                                data-bs-toggle="popover" 
                                data-bs-placement="left" 
                                data-popover-content="#sort-popover-template">
                                <i class="fa-solid fa-sort fa-lg me-2"></i>
                                Sortuj
                            </button>

                            
                            <div class="dropdown d-inline-block">
                                <button class="btn btn-light fs-5 me-2 dropdown-toggle" type="button" data-bs-toggle="dropdown" data-bs-auto-close="outside">
                                    <i class="fa-solid fa-filter fa-lg me-2"></i>
                                    Filtruj
                                </button>
                                
                                <div class="dropdown-menu shadow-sm p-0" style="min-width: 250px;">
                                    <form id="filter-form" class="p-3" hx-get="/search" hx-include="#search-input, #current-sort" hx-target="#search-results-container" hx-swap="outerHTML">
                                        <h6 class="text-uppercase text-muted fw-bold mb-3" style="font-size: 0.8rem;">Data publikacji</h6>
                                        
                                        <div class="mb-2">
                                            <label for="date_from" class="form-label small text-muted mb-1 fw-semibold">Od:</label>
                                            <input type="date" id="date_from" name="date_from" value="{{ request.args.get('date_from', '') }}" class="form-control form-control-sm border">
                                        </div>
                                        
                                        <div class="mb-3">
                                            <label for="date_to" class="form-label small text-muted mb-1 fw-semibold">Do:</label>
                                            <input type="date" id="date_to" name="date_to" value="{{ request.args.get('date_to', '') }}" class="form-control form-control-sm border">
                                        </div>
                                        
                                        <hr class="mx-n3">
                                        <div class="d-flex gap-2">
                                            <button type="button" 
                                                    class="btn btn-outline-secondary btn-sm w-50"
                                                    onclick="document.getElementById('date_from').value=''; document.getElementById('date_to').value=''; htmx.trigger('#filter-form', 'submit');">
                                                Wyczyść
                                            </button>
                                            
                                            <button type="submit" class="btn btn-dark btn-sm w-50">
                                                Zastosuj
                                            </button>
                                        </div>
                                    </form>
                                </div>
                            </div>

                            <div class="input-group" style="width: 400px;">
                                <span class="input-group-text bg-light border"><i class="fa-solid fa-magnifying-glass"></i></span>
                                <input type="search"
                                        id="search-input"
                                        class="form-control border" 
                                        placeholder="Wyszukaj..."
                                        name="q"
                                        hx-get="/search" 
                                        hx-include="#date_from, #date_to, #current-sort"
                                        hx-trigger="input changed delay:500ms, search" 
                                        hx-target="#result-list">
                            </div>
                        </div>
                    </div>

                    <div class="d-none" id="sort-popover-template">
                        {% include 'partials/sort_popover.html' %}
                    </div>
                    <input type="hidden" id="current-sort" name="sort" value="date_desc">

                    <div id="result-list" class="flex-grow-1 overflow-auto ps-2 pb-2">
                        {% include 'partials/search_results.html' %}
                    </div>
                </main>
            </div>
        </div>
    </div>


    <!-- modals -->
    <div class='z-2'>
        <div id="warning-detail-modal-container"></div>
        {% include 'partials/info_modal.html' %}
        {% include 'partials/newsletter_modal.html' %}
    </div>
    <!-- toasts -->
    <div class="toast-container p-3 overflow-hidden h-100 position-absolute top-0 end-0 m-0 p-0 z-1">
        <div id="toastPlacement" class="d-flex flex-column gap-2 p-2">
            
        </div>
    </div>

    
    <script src="https://unpkg.com/htmx.org@1.9.6"></script>
    <script src="{{ url_for('static', filename='js/bootstrap.bundle.min.js') }}"></script>

    <script>

        // The page always loads data sorted by date (newest), so keep #current-sort in sync.
        // Covers bfcache restore (pageshow fires with persisted=true after back/forward or reload).
        window.addEventListener('pageshow', function() {
            let cs = document.getElementById('current-sort');
            if (cs) cs.value = 'date_desc';
        });

        //CONST ELEMENTS
        // navbar modals buttons 
        const btnInfo = document.getElementById('nav-btn-info');
        const btnAlerts = document.getElementById('nav-btn-warnings');
        const btnNews = document.getElementById('nav-btn-news');

        // navbar modals
        const infoModal = document.getElementById('infoModal');
        const newsModal = document.getElementById('newsletterModal');

        //HELP FUNCIONS
        const resetNavbar = () => {
                btnInfo.classList.remove('btn-navbar-active');
                btnNews.classList.remove('btn-navbar-active');
                btnAlerts.classList.add('btn-navbar-active');
            }

        //EVENT LISTENERS

        // script for sort and filter poopovers from bootstrap
        document.addEventListener("DOMContentLoaded", function(){
            let popoverTriggerList = [...document.querySelectorAll('[data-bs-toggle="popover"]')]
            
            let popoverList = popoverTriggerList.map(function (popoverTriggerEl) {
            let contentSelector = popoverTriggerEl.getAttribute('data-popover-content');
                
            // setting poopover bootstrap options
            let popoverOptions = {
                html: true,
                sanitize: false, // turn off html filtering
            };

            if (contentSelector) {
                popoverOptions.content = function() {
                    let el = document.querySelector(contentSelector);
                    // Sort popover: derive the checked radio from the single source of truth (#current-sort)
                    if (contentSelector === '#sort-popover-template') {
                        let currentSort = (document.getElementById('current-sort') || {}).value || 'date_desc';
                        el.querySelectorAll('.sort-option').forEach(function(r) {
                            if (r.value === currentSort) {
                                r.setAttribute('checked', 'checked');
                            } else {
                                r.removeAttribute('checked');
                            }
                        });
                    }
                    return el.innerHTML;
                };
            }

            return new bootstrap.Popover(popoverTriggerEl, popoverOptions);
            });
        });

        //nabar active button class show implementation
        document.addEventListener("DOMContentLoaded", function() {
            // listening info modal
            if (infoModal) {
                // listener when info modal will open (bootstrap event)
                infoModal.addEventListener('show.bs.modal', function() {
                    btnAlerts.classList.remove('btn-navbar-active');
                    btnInfo.classList.add('btn-navbar-active');
                });
                // listener when modal will hide
                infoModal.addEventListener('hidden.bs.modal', resetNavbar);
            }

            // listening newsletter modal
            if (newsModal) {
                // listener when newsletter modal will open (bootstrap event)
                newsModal.addEventListener('show.bs.modal', function() {
                    btnAlerts.classList.remove('btn-navbar-active');
                    btnNews.classList.add('btn-navbar-active');
                });
                // listener when modal will hide
                newsModal.addEventListener('hidden.bs.modal', resetNavbar);
            }
        });

        // Sort option handler - listens for clicks on sort radio buttons inside Bootstrap popover
        document.body.addEventListener('change', function(event) {
            if (event.target.classList.contains('sort-option')) {
                let sortValue = event.target.value;

                // Update hidden input so search and load-more include the sort param
                document.getElementById('current-sort').value = sortValue;

                // Close the sort popover
                let popoverBtn = document.querySelector('[data-popover-content="#sort-popover-template"]');
                let popoverInstance = bootstrap.Popover.getInstance(popoverBtn);
                if (popoverInstance) popoverInstance.hide();

                // Get current search query to preserve it during re-sort
                let searchQuery = document.querySelector('input[name="q"]').value || '';

                // Trigger HTMX request to reload results with new sort order
                htmx.ajax('GET', '/search?sort=' + sortValue + '&q=' + encodeURIComponent(searchQuery), {target: '#result-list'});
            }
        });

        // GLOBAL EVENTS BY HTMX
        document.body.addEventListener("htmx:afterSwap", function(event) {
            // GIS refresh reloads data as date_desc -> reset sort source of truth
            if (event.detail.target.id === "sync-status") {
                let cs = document.getElementById('current-sort');
                if (cs) cs.value = 'date_desc';
            }

            // provides when user click info button from warning detail modal will shows up 
            // if new modal was swaped
            if (event.detail.target.id === "warning-detail-modal-container") {
                // get modal and show it
                let newModal = new bootstrap.Modal(document.getElementById('alertDetailModal'));
                newModal.show();
            }

            // toast notification logic
            // get toasts which are not showed
            let newToasts = document.querySelectorAll('.toast:not(.toast-initialized)');

            newToasts.forEach((toastEl) => {
                // initialize toast elem
                toastEl.classList.add('toast-initialized');

                // retrun new bootstrap toast and show it for 10 sec
                let toast = new bootstrap.Toast(toastEl, {delay: 10000});
                toast.show()

                // romve toast from html if is hidden
                toastEl.addEventListener('hidden.bs.toast', () => {
                    toastEl.remove();
                });
            })
        });
    </script>
</body>
</html>
