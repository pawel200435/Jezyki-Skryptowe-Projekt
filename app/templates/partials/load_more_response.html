{% include 'partials/alert_table_rows.html' %}

{% if has_more %}
<tr id="load-more-row">
    <td colspan="7" class="p-0 border-0">
        <div class="w-100 py-2 bg-white">
            <button type="button"
                hx-get="/search?offset={{ next_offset }}&sort={{ current_sort|default('date_desc') }}"
                hx-target="#load-more-row"
                hx-include="#search-input, #date_from, #date_to, #current-sort"
                hx-swap="outerHTML"
                class="btn btn-outline-blue w-100 text-center">
                <i class="fa-solid fa-download"></i>
                Załaduj więcej ostrzeżeń
            </button>
        </div>
    </td>
</tr>
{% else %}
<tr id="load-more-row">
    <td colspan="7" class="p-0 border-0 text-center text-muted py-3">
        Wyświetlono wszystkie ostrzeżenia
    </td>
</tr>
{% endif %}
