<div id="search-results-container" {% if oob %}hx-swap-oob="true"{% endif %}>
    {% if alerts %}
        <table class="table table-hover shadow-sm align-middle bg-white w-100 m-0">
            <thead class="position-sticky top-0 bg-white border-bottom-2 border-black shadow-sm">
                <tr class="border-bottom-2 border-black bg-white align-middle">
                    <th class="text-center" style="width: 3%;">
                        <input class="form-check-input m-0" type="checkbox" id="selectAllCheckboxes" title="Zaznacz wszystkie">
                    </th>
                    <th scope="col" style="width: 10%;">Zdjęcie</th>
                    <th scope="col" style="width: 27%;">Dotyczy (Produkt + Partia)</th>
                    <th scope="col" style="width: 20%;">Producent</th>
                    <th scope="col" style="width: 25%;">Zagrożenie</th>
                    <th scope="col" style="width: 10%;">Data komunikatu</th>
                    <th scope="col" style="width: 5%;"></th>
                </tr>
            </thead>
            <tbody id="alerts-tbody">
                {% include 'partials/alert_table_rows.html' %}
                {% include 'partials/load_more_warnings_button.html' %}
            </tbody>
        </table>
    {% else %}
        <p class="fs-3 text-center text-secondary">Brak ostrzeżeń o podanych parametrach</p>
    {% endif %}

    <script>
        document.body.addEventListener('change', function(event) {
        
            // check/uncheck all
            if (event.target.id === 'selectAllCheckboxes') {
                const isChecked = event.target.checked;
                const checkboxes = document.querySelectorAll('.alert-checkbox');
                
                checkboxes.forEach(el => {
                    el.checked = isChecked;
                });
            }
            
            // if user uncheck one element the th checkbox need to be uncheck too 
            if (event.target.classList.contains('alert-checkbox')) {
                const allCheckboxes = document.querySelectorAll('.alert-checkbox');
                const allChecked = Array.from(allCheckboxes).every(el => el.checked);
                
                const selectAllCb = document.getElementById('selectAllCheckboxes');
                if (selectAllCb) {
                    selectAllCb.checked = allChecked;
                }
            }
        });
    </script>
</div>
