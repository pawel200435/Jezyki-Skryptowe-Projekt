<div class="p-2" style="min-width: 200px;">
    <h6 class="text-uppercase text-muted fw-bold mb-3" style="font-size: 0.8rem;">Sortuj według:</h6>
    <div class="form-check mb-2">
        <input class="form-check-input sort-option" type="radio" name="sort" value="date_desc" id="sortDateDesc" checked autocomplete="off">
        <label class="form-check-label" for="sortDateDesc">Data komunikatu: Najnowsze</label>
    </div>
    <div class="form-check mb-2">
        <input class="form-check-input sort-option" type="radio" name="sort" value="date_asc" id="sortDateAsc" autocomplete="off">
        <label class="form-check-label" for="sortDateAsc">Data komunikatu: Najstarsze</label>
    </div>
    <div class="form-check mb-2">
        <input class="form-check-input sort-option" type="radio" name="sort" value="brand_asc" id="sortBrandAsc" autocomplete="off">
        <label class="form-check-label" for="sortBrandAsc">Producent: A-Z</label>
    </div>
    <div class="form-check mb-2">
        <input class="form-check-input sort-option" type="radio" name="sort" value="brand_desc" id="sortBrandDesc" autocomplete="off">
        <label class="form-check-label" for="sortBrandDesc">Producent: Z-A</label>
    </div>
    <div class="form-check mb-2">
        <input class="form-check-input sort-option" type="radio" name="sort" value="product_asc" id="sortProductAsc" autocomplete="off">
        <label class="form-check-label" for="sortProductAsc">Produkt: A-Z</label>
    </div>
    <div class="form-check">
        <input class="form-check-input sort-option" type="radio" name="sort" value="product_desc" id="sortProductDesc" autocomplete="off">
        <label class="form-check-label" for="sortProductDesc">Produkt: Z-A</label>
    </div>
</div>
