<div id="sync-status" class="topbar-actions d-flex align-items-center">
    <span class="text-muted me-3 last-update">
        Ostatnia aktualizacja: <strong class="text-dark">{{ last_sync }}</strong>
    </span>
    
    <button hx-post="/refresh" 
            hx-target="#sync-status" 
            hx-swap="outerHTML" 
            onclick="this.innerHTML='<i class=\'fa-solid fa-spinner fa-spin me-1\'></i> Odświeżanie...'; this.disabled=true;"
            class="btn btn-light border-dark shadow-sm fw-semibold">
        <i class="fa-solid fa-rotate-right me-1"></i> Odśwież ostrzeżenia GIS
    </button>
</div>
